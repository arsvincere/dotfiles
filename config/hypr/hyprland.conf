# Const ----------------------------------------------------------------------

$mainMod = LOGO
$terminal = alacritty
monitor = , preferred, auto, auto

# Environment variables ------------------------------------------------------

env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct # change to qt6ct if you have that

##env variables for gtk theme
exec = gsettings set org.gnome.desktop.interface icon-theme "Gruvbox-Material-Dark"
exec = gsettings set org.gnome.desktop.interface gtk-theme "Gruvbox-Material-Dark"
# gsettings set org.gnome.desktop.interface cursor-theme ''
# gsettings set org.gnome.desktop.interface font-name ''

