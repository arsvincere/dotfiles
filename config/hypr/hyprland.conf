# Window rule ----------------------------------------------------------------

# На будущее, можно разделить запуск в текущем или привязанном workspace
# На LOGO CTRL можно повесить
# You can try launching it with a different class name.
# For workspace 2:
# windowrulev2 = workspace 2,class:^(firefox-workspaced)$
# bind = SUPER SHIFT, F, exec, firefox --class firefox-workspaced
# For active workspace:
# bind = SUPER, F, exec, firefox

# Set bordercolor to red if window is fullscreen
windowrulev2 = bordercolor rgb(DCA561) rgb(FF9E3B),fullscreen:1 

# Diary
windowrulev2 = fullscreen, class:^(Alacritty)$, title:^(diary)$

# SpeedCrunch
windowrulev2 = float, class:^(org.speedcrunch.speedcrunch)$, title:^(SpeedCrunch)$
windowrulev2 = pin, class:^(org.speedcrunch.speedcrunch)$, title:^(SpeedCrunch)$
windowrulev2 = size 600 300, class:^(org.speedcrunch.speedcrunch)$, title:^(SpeedCrunch)$
windowrulev2 = move 8 26, class:^(org.speedcrunch.speedcrunch)$, title:^(SpeedCrunch)$

# English dict
windowrulev2 = float, class:^(Alacritty)$, title:^(english)$
windowrulev2 = pin, class:^(Alacritty)$, title:^(english)$
windowrulev2 = size 640 480, class:^(Alacritty)$, title:^(english)$
windowrulev2 = move 8 26, class:^(Alacritty)$, title:^(english)$

# AVIN Trade System
windowrulev2 = fullscreen, class:^(python3)$, title:^(AVIN  -  Ars  Vincere)$
windowrulev2 = workspace 1, class:^(python3)$, title:^(AVIN  -  Ars  Vincere)$

# Xmind
windowrulev2 = tile, class:^(Xmind)$, title:^(Xmind)$

# windowrule = opacity 1.0 override 0.5 override 0.8 override,^(Alacritty)$ # set opacity to 1.0 active, 0.5 inactive and 0.8 fullscreen for kitty

# Bindings -------------------------------------------------------------------

#      Mod          Key         Dispatcher      Param
bind = LOGO CTRL ALT,Escape, exit, 
bind = LOGO,        Escape, killactive,
bind = LOGO,        Tab,    exec,           wofi --show drun
bind = LOGO,        Space,  exec,           alacritty
bind = LOGO,        n,      exec,           pkill -SIGUSR1 waybar
bind = LOGO SHIFT,  n,      exec,           pkill -SIGUSR2 waybar
bind = LOGO,        m,      fullscreen,     1
bind = LOGO SHIFT,  m,      fullscreen,     0
bind = LOGO,        y,      togglesplit,    # dwindle
bind = LOGO,        u,      togglefloating, 

# Screenshot
# bind = ,            PRINT,  exec,           hyprshot -m output
# bind = SHIFT,       PRINT,  exec,           hyprshot -m window
# bind = CTRL,        PRINT,  exec,           hyprshot -m region
bind = ,            PRINT,  exec,           grimshot --notify savecopy screen
bind = SHIFT,       PRINT,  exec,           grimshot --notify savecopy area
bind = ALT,         PRINT,  exec,           grimshot --notify savecopy active

# Screenshot
# bind = LOGO,        p,      exec,           hyprpicker -f hex -ra
# bind = LOGO SHIFT,  p,      exec,           hyprpicker -f rgb -ra

