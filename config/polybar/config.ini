[colors]
background = #DD080808
; –ź–ļ—ā–ł–≤–Ĺ–ĺ–Ķ –ĺ–ļ–Ĺ–ĺ bg
background-alt = #080808
; –ě—Ā–Ĺ–ĺ–≤–Ĺ–ĺ–Ļ —ā–Ķ–ļ—Ā—ā
foreground = #CC76946A
; –ó–į–≥–ĺ–Ľ–ĺ–≤–ļ–ł —Ä–į–∑–ī–Ķ–Ľ–ĺ–≤
primary = #CC76946A
; ???
secondary = #0000FF
alert = #C34043
disabled = #2B3328

[bar/topbar]
width = 100%
height = 18px
font-0 = "sourcecodepro:size=11;3"
font-1 = "hacknerdfont:size=10;3"
modules-left = xworkspaces
modules-center = date 
modules-right = xkeyboard pulseaudio cpu memory filesystem powermenu
line-size = 2pt
background = ${colors.background}
foreground = ${colors.foreground}
radius = 0
border-size = 0pt
border-color = #00000000
padding-left = 0
padding-right = 1
module-margin = 1
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
; separator = |
; separator-foreground = ${colors.disabled}
; dpi = 96
; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3
; override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = #2B3328
label-active-foreground = #76946A
; label-active-underline= #98BB6
; label-active-underline= #C8C093
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = #2B3328
label-empty-padding = 1

[module/date]
; format = "  %Y-%m-%d %a    %H:%M:%S"
type = internal/date
interval = 1
date = ÔÄó %H:%M
date-alt = ÔĀ≥ %a %Y-%m-%d  ÔÄó %H:%M:%S
label = %date%
label-foreground = ${colors.primary}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = "[%layout%]"
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

; [module/xwindow]
; type = internal/xwindow
; label = %title:0:60:...%

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "ÔÄ® "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = "ÔÄ¶ mute"
label-muted-foreground = #DCA561

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ôíľ "
format-prefix-foreground = ${colors.primary}
; label = %percentage:2%%
label = %percentage%%

[module/memory]
type = internal/memory
interval = 2
; format-prefix = "ÔĒč "
format-prefix = "ÓŅÖ "

format-prefix-foreground = ${colors.primary}
; label = %percentage_used:2%%
label = %used%

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
; label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%
label-mounted = ÔĎ≤%{F#F0C674}%{F-} %free%
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/systray]
type = internal/tray
format-margin = 8pt
tray-spacing = 16pt

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
